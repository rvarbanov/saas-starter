services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
      - path: .secret
        required: false
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["pnpm", "dev:native", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  node_modules:
