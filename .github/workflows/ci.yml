name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

  docker-integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Integration tests in Compose
        run: docker compose run --rm app pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          # No `.secret` in CI; Next/AuthKit need placeholders for `pnpm dev:native` in Playwright webServer.
          WORKOS_CLIENT_ID: client_01CIPlaceholderXXXXXXXXXXXXXXXX
          NEXT_PUBLIC_WORKOS_REDIRECT_URI: http://localhost:3000/callback
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          WORKOS_API_KEY: sk_test_ci_placeholder
          WORKOS_COOKIE_PASSWORD: "01234567890123456789012345678901"
