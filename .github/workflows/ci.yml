name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

  docker-integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Integration tests in Compose
        run: docker compose run --rm app pnpm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    # Browsers + OS deps are pre-installed; skip `playwright install --with-deps` (slow apt on every run).
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # No `.secret` in CI; Next/AuthKit need placeholders for Playwright webServer.
          WORKOS_CLIENT_ID: client_01CIPlaceholderXXXXXXXXXXXXXXXX
          NEXT_PUBLIC_WORKOS_REDIRECT_URI: http://localhost:3000/callback
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          WORKOS_API_KEY: sk_test_ci_placeholder
          WORKOS_COOKIE_PASSWORD: "01234567890123456789012345678901"
